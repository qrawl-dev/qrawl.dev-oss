[build-system]
requires      = ["hatchling"]
build-backend = "hatchling.build"

[project]
name        = "qrawl-py"
version     = "0.1.0"
description = "Official Python SDK for qrawl.dev — web crawling for AI agents"
readme      = "README.md"
license     = { file = "LICENSE" }
authors     = [{ name = "qrawl.dev", email = "hello@qrawl.dev" }]
keywords    = ["web-crawling", "scraping", "ai-agents", "rag", "langchain"]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.9",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
]
requires-python = ">=3.9"
dependencies    = [
  "httpx>=0.27.0",
  "pydantic>=2.0.0",
]

[project.optional-dependencies]
langchain   = ["langchain-core>=0.2.0"]
llamaindex  = ["llama-index-core>=0.10.0"]
all         = ["qrawl-py[langchain,llamaindex]"]

[project.urls]
Homepage      = "https://qrawl.dev"
Documentation = "https://docs.qrawl.dev"
Repository    = "https://github.com/qrawl-dev/qrawl"
Issues        = "https://github.com/qrawl-dev/qrawl/issues"

[tool.hatch.build.targets.wheel]
packages = ["qrawl"]
